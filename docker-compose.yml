services:
  postgres-db:
    image: postgres:15-alpine
    container_name: veterinaria-db
    environment:
      - POSTGRES_USER=veterinaria_admin
      - POSTGRES_PASSWORD=veterinaria_password
      - POSTGRES_DB=veterinaria_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

